server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # 👇 serve frontend under subpath
    location /dev/egv-frontend/ {
        try_files $uri $uri/ /index.html;
    }

    # 👇 optional: redirect exact match
    location = /dev/egv-frontend {
        return 301 /dev/egv-frontend/;
    }

    # 👇 backend proxy
    location /api {
        proxy_pass http://k8s-ingressn-ingressn-09f0faf155-fc4a3bcb6620c60e.elb.ap-south-1.amazonaws.com/dev/egv-backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}